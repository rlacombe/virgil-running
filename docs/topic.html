<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Switchback Running</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --dark: #0a0a0a;
      --charcoal: #141414;
      --ash: #2a2a2a;
      --stone: #888;
      --light: #e0e0e0;
      --white: #f5f5f5;
      --neon-orange: #ff6b2b;
      --neon-cyan: #00f0ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--dark);
      color: var(--light);
      line-height: 1.7;
    }

    /* --- Nav --- */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--ash);
      padding: 0.8rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    nav a.brand {
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--white);
      text-decoration: none;
    }

    nav a.brand span { color: var(--neon-orange); }

    nav a.back {
      font-size: 0.8rem;
      color: var(--stone);
      text-decoration: none;
    }

    nav a.back:hover { color: var(--light); }

    /* --- Article --- */
    article {
      max-width: 720px;
      margin: 0 auto;
      padding: 6rem 2rem 4rem;
    }

    article h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: var(--white);
      margin-bottom: 0.5rem;
      line-height: 1.1;
    }

    article .meta {
      font-size: 0.8rem;
      color: var(--stone);
      margin-bottom: 3rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--ash);
    }

    article h2 {
      font-family: 'Oswald', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: var(--neon-orange);
      margin: 2.5rem 0 1rem;
      line-height: 1.2;
    }

    article h3 {
      font-family: 'Oswald', sans-serif;
      font-size: 1.15rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: var(--white);
      margin: 2rem 0 0.8rem;
    }

    article h4 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--light);
      margin: 1.5rem 0 0.5rem;
    }

    article p {
      color: var(--stone);
      font-weight: 300;
      margin-bottom: 1rem;
    }

    article strong { color: var(--light); font-weight: 500; }

    article a { color: var(--neon-cyan); }

    article ul, article ol {
      margin: 0.5rem 0 1.5rem 1.2rem;
      color: var(--stone);
      font-weight: 300;
    }

    article li { margin-bottom: 0.4rem; }
    article li strong { color: var(--light); }

    article blockquote {
      border-left: 3px solid var(--neon-orange);
      padding: 0.5rem 0 0.5rem 1.2rem;
      margin: 1.5rem 0;
      font-style: italic;
      color: var(--stone);
    }

    article code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      background: var(--charcoal);
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      color: var(--neon-orange);
    }

    article pre {
      background: var(--charcoal);
      border: 1px solid var(--ash);
      border-radius: 6px;
      padding: 1.2rem;
      margin: 1.5rem 0;
      overflow-x: auto;
    }

    article pre code {
      background: none;
      padding: 0;
      color: var(--light);
      font-size: 0.8rem;
      line-height: 1.6;
    }

    article table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.85rem;
    }

    article th {
      text-align: left;
      padding: 0.6rem 0.8rem;
      border-bottom: 2px solid var(--ash);
      color: var(--white);
      font-weight: 500;
    }

    article td {
      padding: 0.5rem 0.8rem;
      border-bottom: 1px solid var(--ash);
      color: var(--stone);
    }

    article hr {
      border: none;
      height: 1px;
      background: var(--ash);
      margin: 2.5rem 0;
    }

    /* --- Loading --- */
    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--stone);
    }

    /* --- Footer --- */
    footer {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem;
      border-top: 1px solid var(--ash);
      text-align: center;
    }

    footer a {
      color: var(--stone);
      font-size: 0.8rem;
      text-decoration: none;
    }

    footer a:hover { color: var(--neon-orange); }

    @media (max-width: 600px) {
      article { padding: 5rem 1.5rem 3rem; }
      article h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="brand" href="index.html">Switchback <span>Running</span></a>
    <a class="back" href="index.html">&larr; Home</a>
  </nav>

  <article id="content">
    <div class="loading">Loading...</div>
  </article>

  <footer>
    <a href="index.html">Back to Switchback Running</a>
  </footer>

  <script>
    const REPO = 'rlacombe/switchback-running';
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');

    // Pretty names for titles
    const titles = {
      'aerobic-base': 'Aerobic Base',
      'age-gender': 'Age & Gender',
      'data-interpretation': 'Data Interpretation',
      'downhill-training': 'Downhill Training',
      'heat-altitude': 'Heat & Altitude',
      'injury-prevention': 'Injury Prevention',
      'long-runs': 'Long Runs',
      'mental-performance': 'Mental Performance',
      'muscular-endurance': 'Muscular Endurance',
      'nutrition': 'Nutrition & Fueling',
      'periodization': 'Periodization',
      'race-execution': 'Race Execution',
      'recovery-overtraining': 'Recovery & Overtraining',
      'sleep': 'Sleep & Recovery',
      'strength-training': 'Strength Training',
      'taper': 'Taper Protocols',
      'volume-progression': 'Volume Progression',
      'workout-types': 'Workout Types',
    };

    if (!file) {
      document.getElementById('content').innerHTML = '<h1>Topic not found</h1><p>Return to <a href="index.html">Switchback Running</a>.</p>';
    } else {
      const url = `https://raw.githubusercontent.com/${REPO}/main/knowledge/${file}.md`;
      fetch(url)
        .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
        .then(md => {
          const title = titles[file] || file.replace(/-/g, ' ');
          document.title = `${title} — Switchback Running`;

          // Remove the first H1 from markdown (we render our own)
          const cleaned = md.replace(/^#\s+.*$/m, '').trim();
          const html = marked.parse(cleaned);

          document.getElementById('content').innerHTML =
            `<h1>${title}</h1>` +
            `<div class="meta">Switchback Running Knowledge Base &middot; <a href="https://github.com/${REPO}/blob/main/knowledge/${file}.md" style="color: var(--stone);">View source</a></div>` +
            html;
        })
        .catch(() => {
          document.getElementById('content').innerHTML = '<h1>Topic not found</h1><p>Return to <a href="index.html">Switchback Running</a>.</p>';
        });
    }
  </script>

</body>
</html>
